name: Build & Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install SkyStream CLI
        run: npm install -g skystream-cli

      - name: Build Plugins
        run: skystream deploy -u "https://raw.githubusercontent.com/${{ github.repository }}/repo"

      - name: Prepare Deploy Directory
        run: |
          mkdir -p deploy
          cp -r dist repo.json deploy/

      - name: Push to repo Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: repo
          publish_dir: ./deploy
          force_orphan: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy plugins [skip ci]'
